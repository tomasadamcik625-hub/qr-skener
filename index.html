<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Čítačka</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --text: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Better for mobile browsers */
            overflow: hidden;
        }
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1.5rem;
            text-align: center;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        #reader-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        #reader {
            width: 100%;
            height: 100%;
            border: none !important;
        }
        /* Override html5-qrcode inline styles for full screen */
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }
        #reader canvas {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        .controls {
            position: absolute;
            bottom: 2rem;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
            padding: 0 1rem;
        }
        button {
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.875rem 1.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        button:active {
            transform: scale(0.95);
        }
        button.primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        #error-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 38, 38, 0.95);
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 20;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        /* Modal */
        #result-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 30;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #result-modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        #result-modal.show .modal-content {
            transform: translateY(0);
        }
        .modal-content h2 {
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            color: #94a3b8;
        }
        .result-box {
            background: #0f172a;
            padding: 1.25rem;
            border-radius: 0.75rem;
            word-break: break-all;
            margin-bottom: 2rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.1rem;
            border: 1px solid #334155;
            color: #e2e8f0;
            max-height: 200px;
            overflow-y: auto;
        }
        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .toast {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #10b981;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <h1>QR Skener</h1>
    </header>

    <div id="reader-container">
        <div id="reader"></div>
        <div id="error-message"></div>
    </div>

    <div class="controls">
        <button id="btn-switch-camera" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
        </button>
        <button id="btn-reset">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            Reštartovať
        </button>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2>Naskenovaný obsah</h2>
            <div class="result-box" id="result-text"></div>
            <div class="modal-actions">
                <button class="primary" id="btn-copy">Kopírovať text</button>
                <button class="primary" id="btn-open-link" style="display: none;">Otvoriť odkaz</button>
                <button id="btn-close-modal">Skenovať znova</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Skopírované!</div>

    <script>
        let html5QrCode;
        let currentFacingMode = "environment";
        let isScanning = false;

        const errorElement = document.getElementById('error-message');
        const modalElement = document.getElementById('result-modal');
        const resultTextElement = document.getElementById('result-text');
        const btnCopy = document.getElementById('btn-copy');
        const btnOpenLink = document.getElementById('btn-open-link');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const btnReset = document.getElementById('btn-reset');
        const btnSwitchCamera = document.getElementById('btn-switch-camera');
        const toastElement = document.getElementById('toast');

        let scannedResult = "";

        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        function showToast(message) {
            toastElement.innerText = message;
            toastElement.classList.add('show');
            setTimeout(() => {
                toastElement.classList.remove('show');
            }, 3000);
        }

        function showError(message) {
            errorElement.innerText = message;
            errorElement.style.display = 'block';
        }

        function hideError() {
            errorElement.style.display = 'none';
        }

        async function startScanner() {
            hideError();
            
            if (html5QrCode && isScanning) {
                try {
                    await html5QrCode.stop();
                } catch (e) {
                    console.warn("Error stopping scanner", e);
                }
                isScanning = false;
            }

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            const config = { 
                fps: 10, 
                qrbox: (viewfinderWidth, viewfinderHeight) => {
                    const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                    return {
                        width: Math.floor(minEdge * 0.7),
                        height: Math.floor(minEdge * 0.7)
                    };
                }
            };

            try {
                await html5QrCode.start(
                    { facingMode: currentFacingMode },
                    config,
                    (decodedText, decodedResult) => {
                        if (isScanning) {
                            html5QrCode.pause();
                            scannedResult = decodedText;
                            showModal(decodedText);
                        }
                    },
                    (errorMessage) => {
                        // Ignore frame errors
                    }
                );
                isScanning = true;
                
                // Check for multiple cameras
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 1) {
                    btnSwitchCamera.style.display = 'flex';
                }

            } catch (err) {
                isScanning = false;
                console.error(err);
                const errStr = err.toString();
                if (errStr.includes('NotAllowedError') || err.name === 'NotAllowedError') {
                    showError("Prístup ku kamere bol zamietnutý. Prosím, povoľte kameru v nastaveniach prehliadača.");
                } else if (errStr.includes('NotFoundError') || err.name === 'NotFoundError') {
                    showError("Na tomto zariadení sa nenašla žiadna kamera.");
                } else {
                    showError("Chyba kamery: " + (err.message || errStr));
                }
            }
        }

        function showModal(text) {
            resultTextElement.innerText = text;
            modalElement.classList.add('show');
            
            if (isValidUrl(text)) {
                btnOpenLink.style.display = 'flex';
                btnOpenLink.onclick = () => {
                    window.open(text, '_blank');
                };
            } else {
                btnOpenLink.style.display = 'none';
            }
        }

        function hideModal() {
            modalElement.classList.remove('show');
            setTimeout(() => {
                if (html5QrCode && isScanning) {
                    html5QrCode.resume();
                }
            }, 300); // Wait for transition
        }

        // Event Listeners
        btnCopy.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(scannedResult);
                showToast("Skopírované do schránky!");
            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = scannedResult;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Skopírované do schránky!");
                } catch (e) {
                    showToast("Chyba pri kopírovaní");
                }
                document.body.removeChild(textArea);
            }
        });

        btnCloseModal.addEventListener('click', hideModal);

        btnReset.addEventListener('click', () => {
            startScanner();
        });

        btnSwitchCamera.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
            startScanner();
        });

        // Start scanner on load
        window.addEventListener('load', () => {
            // Small delay to ensure DOM is fully ready for the video element
            setTimeout(startScanner, 100);
        });
    </script>
</body>
</html>
